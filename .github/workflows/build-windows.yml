name: Build Sentinel (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build du sidecar Python
        shell: pwsh
        run: |
          cd backend
          python -m venv venv
          ./venv/Scripts/pip install -r requirements.txt
          ./venv/Scripts/pip install pyinstaller
          
          # On garde --onedir
          ./venv/Scripts/pyinstaller --onedir --noconsole --name sentinel-backend main.py
          
          # Création du dossier de destination
          New-Item -ItemType Directory -Force -Path ../src-tauri/binaries
          
          # Copie tout le contenu du dossier généré
          Copy-Item -Recurse -Path dist/sentinel-backend/* -Destination "../src-tauri/binaries/"
          
          # IMPORTANT : On doit s'assurer que le fichier attendu par Tauri existe bien
          # Si Tauri attend 'sentinel-backend-x86_64-pc-windows-msvc.exe', 
          # on renomme l'exécutable généré pour qu'il corresponde exactement :
          Rename-Item -Path "../src-tauri/binaries/sentinel-backend.exe" -NewName "sentinel-backend-x86_64-pc-windows-msvc.exe"

      - name: Installer les dépendances frontend
        run: npm install

      - name: Build de l'application Tauri
        run: npm run tauri build

      - name: Récupérer l'installeur
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-installer-windows
          path: src-tauri/target/release/bundle/msi/*.msi