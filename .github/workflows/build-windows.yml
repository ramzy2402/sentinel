name: Build Sentinel (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build du sidecar Python
  shell: pwsh
  run: |
    $ErrorActionPreference = "Stop"
    cd backend

    if (-not (Test-Path "requirements.txt")) {
      Write-Error "requirements.txt introuvable dans backend/ — arrêt du build."
      exit 1
    }

    python -m venv venv

    ./venv/Scripts/pip install -r requirements.txt
    if ($LASTEXITCODE -ne 0) { Write-Error "pip install a échoué"; exit 1 }

    ./venv/Scripts/pip install pyinstaller
    if ($LASTEXITCODE -ne 0) { Write-Error "installation de pyinstaller a échoué"; exit 1 }

    Write-Host "--- Paquets installés dans le venv ---"
    ./venv/Scripts/pip list

    ./venv/Scripts/python -c "import psutil; print('psutil OK, version', psutil.__version__)"
    if ($LASTEXITCODE -ne 0) { Write-Error "psutil non importable dans ce venv — arrêt du build."; exit 1 }

    ../venv/Scripts/python -m PyInstaller --onefile --noconsole --name sentinel-backend `
  --collect-all psutil --collect-all mss --collect-all imagehash --collect-all pywin32 main.py
    if ($LASTEXITCODE -ne 0) { Write-Error "PyInstaller a échoué"; exit 1 }

    New-Item -ItemType Directory -Force -Path ../src-tauri/binaries
    Copy-Item dist/sentinel-backend.exe "../src-tauri/binaries/sentinel-backend-x86_64-pc-windows-msvc.exe"

      - name: Récupérer le rapport PyInstaller (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-warnings
          path: backend/build/sentinel-backend/warn-sentinel-backend.txt
      - name: Installer les dépendances frontend
        run: npm install

      - name: Build de l'application Tauri
        run: npm run tauri build

      - name: Récupérer l'installeur
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-installer-windows
          path: src-tauri/target/release/bundle/msi/*.msi